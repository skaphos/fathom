#
# Kind cluster config for Fathom end-to-end testing.
#
# Pinned node image matches the envtest Kubernetes version (1.36) declared in
# Taskfile.yml so unit and e2e suites resolve API objects against the same
# server version. Bump kindest/node and ENVTEST_K8S_VERSION in lockstep, and
# pin the node image by the digest from the kind release notes — kind only
# publishes specific patch tags per release (e.g. v1.36.1, never v1.36.0).
#
# Single-node topology: every addon Fathom validates (CoreDNS, cert-manager,
# external-secrets, Cilium) is happy on one node, and a single node keeps the
# spin-up fast on a developer laptop. The Cilium agent DaemonSet schedules a
# single pod here (DesiredNumberScheduled=1); add a worker node only when an
# addon under test requires real scheduling spread.
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: fathom-e2e
# Disable kindnet so Cilium can own the CNI: the Cilium adapter (SKA-66) checks
# the cilium-operator Deployment and the cilium agent DaemonSet, which only
# exist when Cilium is the cluster CNI. kube-proxy is left in place so Cilium
# runs in its default (non-kube-proxy-replacement) mode. The helmfile fixture
# installs Cilium first — cert-manager/external-secrets `needs` it — so pod
# networking is up before any other addon or the operator is deployed.
networking:
  disableDefaultCNI: true
nodes:
  - role: control-plane
    image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
    # The CoreDNS adapter's dns_resolution check launches probe Pods inside the
    # cluster; Cilium provides their networking. No extraMounts, port-forwards,
    # or registry config needed for the current addon coverage.
