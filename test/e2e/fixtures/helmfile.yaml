#
# Helmfile for the Fathom end-to-end addon stack.
#
# Installs the addons Fathom validates so the AddonCheck samples in
# config/samples/ have something real to assert against. CoreDNS is preinstalled
# by kind and is not managed from here.
#
# Cilium is installed first and provides the cluster CNI (kindnet is disabled in
# kind-cluster.yaml). Every other release `needs` it (directly or transitively)
# so helmfile's DAG brings networking up before any pod-networked addon —
# and before the operator is deployed by the e2e:cluster:fathom task.
#
# The stack is tiered (skaphos/fathom#178) via release labels:
#
#   - `tier: core` marks the small always-on core stack (Cilium, cert-manager,
#     external-secrets; CoreDNS is core too but ships with kind). Every scoped
#     sync installs it — Cilium is the CNI, nothing schedules without it.
#   - `addon: <name>` names the addon each release belongs to (multi-release
#     addons such as istio share one label). Releases without `tier: core` are
#     opt-in: installed only when their addon is selected.
#
# Every release MUST carry an `addon` label, and the label sets must match the
# CoreAddons/OptInAddons lists in test/utils — a drift guard in
# test/utils/utils_test.go enforces this.
#
# Apply the full stack with:
#   helmfile -f test/e2e/fixtures/helmfile.yaml sync
# or a slice of it with selectors (what E2E_ADDONS expands to):
#   helmfile -f test/e2e/fixtures/helmfile.yaml --selector tier=core \
#     --selector addon=istio sync
# or via the Taskfile:
#   go -C tools tool task e2e:cluster:addons [E2E_ADDONS=core,istio,...]
repositories:
  - name: cilium
    url: https://helm.cilium.io
  - name: jetstack
    url: https://charts.jetstack.io
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  # Envoy Gateway publishes gateway-helm only to Docker Hub's OCI registry.
  - name: envoyproxy
    url: registry-1.docker.io/envoyproxy
    oci: true
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts
  - name: argo
    url: https://argoproj.github.io/argo-helm
  # Community chart for NodeLocal DNSCache (upstream ships raw manifests only).
  - name: deliveryhero
    url: https://charts.deliveryhero.io
  - name: azure-workload-identity
    url: https://azure.github.io/azure-workload-identity/charts

releases:
  - name: cilium
    namespace: kube-system
    labels:
      tier: core
      addon: cilium
    chart: cilium/cilium
    # Validated against kindest/node v1.36.1 (k8s 1.36) by the e2e suite. Bump
    # together with the node image in kind-cluster.yaml when k8s moves.
    version: 1.19.5
    wait: true
    timeout: 600
    values:
      - image:
          pullPolicy: IfNotPresent
        # kube-proxy stays in place (see kind-cluster.yaml), so Cilium runs in
        # its default mode. ipam.mode=kubernetes uses the node PodCIDR kind
        # allocates — the documented Cilium-on-kind configuration.
        ipam:
          mode: kubernetes
        # Single-node kind cluster: one operator replica so the Cilium adapter's
        # control_plane_health family sees AvailableReplicas == desired. The
        # chart default of 2 would leave one replica Pending and trip a Fail.
        operator:
          replicas: 1

  - name: cert-manager
    namespace: cert-manager
    labels:
      tier: core
      addon: cert-manager
    chart: jetstack/cert-manager
    version: v1.20.2
    needs:
      - kube-system/cilium
    createNamespace: true
    wait: true
    timeout: 600
    values:
      - installCRDs: true
        # Resource defaults are small enough for a single-node kind cluster
        # while still exercising the cert-manager addon family Fathom checks:
        # controller, webhook, cainjector, plus the validating webhook config.
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
        webhook:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
        cainjector:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi

  - name: external-dns
    namespace: external-dns
    labels:
      addon: external-dns
    chart: external-dns/external-dns
    version: 1.21.1
    needs:
      - kube-system/cilium
    createNamespace: true
    wait: true
    timeout: 600
    values:
      # The inmemory provider needs no cloud credentials, so the controller
      # runs (and reconciles its sources) self-contained inside kind — the
      # Deployment readiness that Fathom's external-dns system_health family
      # checks is genuine. The DNSEndpoint CRD ships in the chart's crds/
      # directory and helm installs it by default, so the adapter's
      # crd_health family asserts a real Established CRD against this stack.
      - provider:
          name: inmemory
        resources:
          requests:
            cpu: 10m
            memory: 32Mi

  - name: metrics-server
    namespace: kube-system
    labels:
      addon: metrics-server
    chart: metrics-server/metrics-server
    version: 3.13.1
    needs:
      - kube-system/cilium
    wait: true
    timeout: 600
    values:
      # kind's kubelets serve certs that are not signed by the cluster CA, so
      # metrics-server needs --kubelet-insecure-tls to scrape them — the
      # upstream-documented escape hatch for test clusters (README
      # "Requirements"; not for production). The chart creates the
      # v1beta1.metrics.k8s.io APIService, which Fathom's api_availability
      # family asserts Available=True against.
      - args:
          - --kubelet-insecure-tls
        resources:
          requests:
            cpu: 10m
            memory: 32Mi

  - name: kube-state-metrics
    namespace: kube-system
    labels:
      addon: kube-state-metrics
    chart: prometheus-community/kube-state-metrics
    version: 7.8.1
    needs:
      - kube-system/cilium
    wait: true
    timeout: 600
    values:
      # selfMonitor exposes KSM's self-telemetry port (8081) on the Service —
      # the endpoint Fathom's metrics_endpoint family scrapes for
      # kube_state_metrics_build_info alongside the main 8080 /metrics port.
      # Without it the telemetry check exercises only its Skipped contract.
      - selfMonitor:
          enabled: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi

  - name: envoy-gateway
    namespace: envoy-gateway-system
    labels:
      addon: envoy-gateway
    chart: envoyproxy/gateway-helm
    version: 1.8.2
    needs:
      - kube-system/cilium
    createNamespace: true
    wait: true
    timeout: 600
    values:
      # Chart defaults: the envoy-gateway controller Deployment plus the
      # bundled Gateway API + Envoy Gateway CRDs — everything Fathom's
      # system_health and crd_health families assert. No GatewayClass/Gateway
      # objects are created, so the gateway_status family exercises its
      # empty-cluster Skipped contract (a provisioned Gateway would need a
      # LoadBalancer address kind cannot assign, so it would never reach
      # Programmed=True here).
      - deployment:
          replicas: 1

  # istio installs in SIDECAR mode only (base CRDs + istiod) — deliberately no
  # ztunnel or istio-cni releases, so Fathom's ztunnel_health and
  # istio_cni_health families assert the Optional-absence Skipped contract
  # against a real cluster. istiod patches the webhook caBundles at startup,
  # which is exactly what the system_health webhook checks assert.
  - name: istio-base
    namespace: istio-system
    labels:
      addon: istio
    chart: istio/base
    version: 1.30.2
    needs:
      - kube-system/cilium
    createNamespace: true
    wait: true
    timeout: 600

  - name: istiod
    namespace: istio-system
    labels:
      addon: istio
    chart: istio/istiod
    version: 1.30.2
    needs:
      - istio-system/istio-base
    wait: true
    timeout: 600
    values:
      # Chart-default requests (500m CPU / 2Gi memory) are sized for real
      # clusters; shrink them so the single-node kind cluster schedules
      # istiod alongside the rest of the stack.
      - pilot:
          resources:
            requests:
              cpu: 10m
              memory: 128Mi

  # NodeLocal DNSCache: a hostNetwork DaemonSet that binds the link-local
  # 169.254.20.10 on a per-node dummy interface and serves the cluster zone by
  # forwarding to kube-dns. Fathom's node-local-dns adapter asserts the
  # DaemonSet is ready on every schedulable node (system_health) and resolves a
  # cluster name through the cache itself (dns_resolution) by pinning a probe
  # pod's resolver to the listen address. kubelet's --cluster-dns is NOT
  # repointed at the cache in this fixture — the probe addresses the cache
  # directly, so the rest of the stack keeps its default DNS path.
  - name: node-local-dns
    namespace: kube-system
    labels:
      addon: node-local-dns
    chart: deliveryhero/node-local-dns
    version: 2.1.0
    needs:
      - kube-system/cilium
    wait: true
    timeout: 600
    values:
      - config:
          dnsDomain: "cluster.local"
          # kind's kube-dns Service IP (default serviceSubnet 10.96.0.0/16).
          dnsServer: "10.96.0.10"
          # The upstream NodeLocal DNSCache listen address; must match the
          # adapter's default listenAddress threshold (the chart's own default
          # is a non-standard 169.254.20.25).
          localDns: "169.254.20.10"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi

  - name: external-secrets
    namespace: external-secrets
    labels:
      tier: core
      addon: external-secrets
    # ESO 2.x serves only external-secrets.io/v1 by default; v1beta1 is gated
    # behind `crds.unsafeServeV1Beta1` and scheduled for removal in the chart.
    # Fathom's adapter prefers v1 (with a v1beta1 fallback for older clusters)
    # so the e2e fixture tracks the current stable chart.
    chart: external-secrets/external-secrets
    version: 2.5.0
    needs:
      - kube-system/cilium
    createNamespace: true
    wait: true
    timeout: 600
    values:
      - installCRDs: true
        # Webhook is what Fathom's external-secrets system_health family
        # exercises alongside the controller Deployment.
        webhook:
          create: true
        certController:
          create: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi

  # Argo CD installs with the chart's default nameOverride ("argocd"), so the
  # four workloads Fathom's argocd system_health family checks land under
  # their official-manifest names: the argocd-application-controller
  # StatefulSet plus the argocd-repo-server / argocd-server / argocd-redis
  # Deployments. The optional dex, applicationset, and notifications
  # controllers are disabled — the adapter does not check them and the
  # single-node kind cluster stays small. No Application objects are
  # declared, so the sync_health family exercises its empty-cluster Skipped
  # contract (a real Application would need an external Git repo the CI
  # cluster should not depend on).
  - name: argocd
    namespace: argocd
    labels:
      addon: argocd
    chart: argo/argo-cd
    version: 10.2.1
    needs:
      - kube-system/cilium
    createNamespace: true
    wait: true
    timeout: 600
    values:
      - dex:
          enabled: false
        notifications:
          enabled: false
        applicationSet:
          enabled: false
        controller:
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
        repoServer:
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
        server:
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
        redis:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi

  # The azure-workload-identity webhook needs no Azure cloud access to run:
  # the chart only wants a tenant ID string, which is baked into the injected
  # env/projection but never validated in-cluster. The webhook manages its own
  # serving cert and patches the MutatingWebhookConfiguration caBundle at
  # startup — exactly what Fathom's webhook_wiring family asserts. No pod in
  # the stack carries the azure.workload.identity/use=true opt-in label, so
  # the projection_sanity family exercises its empty-cluster Skipped contract.
  - name: azure-workload-identity
    namespace: azure-workload-identity-system
    labels:
      addon: azure-workload-identity
    chart: azure-workload-identity/workload-identity-webhook
    version: 1.6.0
    needs:
      - kube-system/cilium
    createNamespace: true
    wait: true
    timeout: 600
    values:
      # Any well-formed GUID works: nothing in kind ever contacts Entra ID.
      - azureTenantID: "00000000-0000-0000-0000-000000000000"
        # Single-node kind cluster: one replica (chart default is 2) keeps the
        # PDB satisfiable and the footprint small.
        replicaCount: 1
