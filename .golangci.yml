version: "2"

linters:
  # Disable the v2 "standard" preset so the enabled set below is the
  # complete one. Future golangci-lint upgrades won't silently add or
  # remove linters from CI.
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - misspell
    - ineffassign
    - unconvert
    - ginkgolinter

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  allow-parallel-runners: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
