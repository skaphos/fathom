version: "3"

vars:
  TASK_RUNNER: go -C tools tool task -d ..
  CONTROLLER_GEN: go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.18.0
  KUSTOMIZE: go run sigs.k8s.io/kustomize/kustomize/v5@v5.6.0
  SETUP_ENVTEST: go run sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
  GOLANGCI_RUNNER: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
  GOIMPORTS_RUNNER: go run golang.org/x/tools/cmd/goimports@v0.42.0
  STATICCHECK_RUNNER: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0
  GOVULNCHECK_RUNNER: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4
  ENVTEST_K8S_VERSION: "1.33"
  IMG: '{{.IMG | default "controller:latest"}}'
  PROBE_IMG: '{{.PROBE_IMG | default "fathom-probe:latest"}}'
  PROBE_PLATFORMS: '{{.PROBE_PLATFORMS | default "linux/amd64,linux/arm64"}}'
  VERSION: '{{.VERSION | default "0.0.1"}}'
  IMAGE_TAG_BASE: '{{.IMAGE_TAG_BASE | default "skaphos.io/fathom"}}'
  BUNDLE_IMG: '{{.BUNDLE_IMG | default (printf "%s-bundle:v%s" .IMAGE_TAG_BASE .VERSION)}}'
  CATALOG_IMG: '{{.CATALOG_IMG | default (printf "%s-catalog:v%s" .IMAGE_TAG_BASE .VERSION)}}'
  E2E_KIND_CLUSTER: '{{.E2E_KIND_CLUSTER | default "fathom-e2e"}}'
  E2E_KIND_CONFIG: '{{.E2E_KIND_CONFIG | default "test/e2e/fixtures/kind-cluster.yaml"}}'
  E2E_HELMFILE: '{{.E2E_HELMFILE | default "test/e2e/fixtures/helmfile.yaml"}}'
  E2E_IMG: '{{.E2E_IMG | default "fathom-operator:e2e"}}'
  # The probe image tag must match the operator's compiled-in DefaultProbeImage
  # so kind's locally-loaded image satisfies the operator's pull request via
  # IfNotPresent. Keep in lockstep with internal/app/options.go DefaultProbeImage
  # and internal/adapter/coredns/adapter.go fallbackProbeImage.
  E2E_PROBE_IMG: '{{.E2E_PROBE_IMG | default "ghcr.io/skaphos/fathom-probe:v0.0.2"}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - '{{.TASK_RUNNER}} --list'

  list:
    desc: List available tasks
    cmds:
      - '{{.TASK_RUNNER}} --list'

  # --- Codegen ---

  manifests:
    desc: Generate CRDs, RBAC, and webhook manifests via controller-gen
    cmds:
      - '{{.CONTROLLER_GEN}} rbac:roleName=manager-role crd webhook paths="./..." output:crd:artifacts:config=config/crd/bases'

  generate:
    desc: Generate DeepCopy implementations via controller-gen
    cmds:
      - '{{.CONTROLLER_GEN}} object:headerFile="hack/boilerplate.go.txt" paths="./..."'

  verify-generated:
    desc: Re-run generators and fail if anything changed (CI gate against stale codegen)
    cmds:
      - task: manifests
      - task: generate
      - |
        untracked_generated="$(git ls-files --others --exclude-standard -- api/ config/)"
        if ! git diff --exit-code -- api/ config/ || [ -n "$untracked_generated" ]; then
          if [ -n "$untracked_generated" ]; then
            echo "::error::Untracked generated artifacts detected:" >&2
            printf '%s\n' "$untracked_generated" >&2
          fi
          echo "::error::Generated artifacts are stale. Run 'task manifests' and 'task generate' and commit the result." >&2
          exit 1
        fi

  # --- Quality ---

  fmt:
    desc: Format code
    cmds:
      - '{{.GOIMPORTS_RUNNER}} -w .'
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - task: manifests
      - task: generate
      - '{{.GOLANGCI_RUNNER}} run ./...'

  lint-fix:
    desc: Run golangci-lint with --fix
    cmds:
      - '{{.GOLANGCI_RUNNER}} run --fix ./...'

  staticcheck:
    desc: Run staticcheck
    cmds:
      - '{{.STATICCHECK_RUNNER}} ./...'

  vuln:
    desc: Run vulnerability scan
    cmds:
      - '{{.GOVULNCHECK_RUNNER}} ./...'

  # --- Tests ---

  test:
    desc: Run unit tests against envtest
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - |
        set -euo pipefail
        ASSETS="$({{.SETUP_ENVTEST}} use {{.ENVTEST_K8S_VERSION}} -p path)"
        KUBEBUILDER_ASSETS="$ASSETS" go test $(go list ./... | grep -v /e2e) -coverprofile=coverage.out

  test-e2e:
    desc: Run the Ginkgo e2e suite against a Kind cluster (kind + docker + helm + helmfile required)
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - task: e2e:cluster:up
      - defer: {task: e2e:cluster:down}
      - task: e2e:cluster:addons
      - task: e2e:cluster:fathom
      - go test ./test/e2e/ -v -ginkgo.v

  # --- Build ---

  build:
    desc: Build manager binary
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - go build -o bin/manager cmd/main.go

  run:
    desc: Run the controller from your host
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - go run ./cmd/main.go

  docker-build:
    desc: Build container image (IMG={{.IMG}})
    cmds:
      - docker build -t {{.IMG}} .

  probe-build:
    desc: Build probe binary
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -buildid=" -o bin/probe ./cmd/probe

  probe-docker-build:
    desc: Build probe container image (PROBE_IMG={{.PROBE_IMG}})
    cmds:
      - docker build -f Dockerfile.probe -t {{.PROBE_IMG}} .

  probe-docker-push:
    desc: Push probe container image (PROBE_IMG={{.PROBE_IMG}})
    cmds:
      - docker push {{.PROBE_IMG}}

  probe-docker-buildx-push:
    desc: Multi-arch build + push probe image (PROBE_IMG={{.PROBE_IMG}}, PROBE_PLATFORMS={{.PROBE_PLATFORMS}})
    cmds:
      - docker buildx build --push --platform {{.PROBE_PLATFORMS}} -f Dockerfile.probe -t {{.PROBE_IMG}} .

  docker-push:
    desc: Push container image (IMG={{.IMG}})
    cmds:
      - docker push {{.IMG}}

  build-installer:
    desc: Render consolidated install.yaml under dist/
    cmds:
      - task: manifests
      - task: generate
      - mkdir -p dist
      - (cd config/manager && {{.KUSTOMIZE}} edit set image controller={{.IMG}})
      - '{{.KUSTOMIZE}} build config/default > dist/install.yaml'

  # --- Cluster lifecycle ---

  install:
    desc: Install CRDs into the current cluster
    cmds:
      - task: manifests
      - '{{.KUSTOMIZE}} build config/crd | kubectl apply -f -'

  uninstall:
    desc: Remove CRDs from the current cluster
    cmds:
      - task: manifests
      - '{{.KUSTOMIZE}} build config/crd | kubectl delete --ignore-not-found=true -f -'

  deploy:
    desc: Deploy the operator to the current cluster
    cmds:
      - task: manifests
      - (cd config/manager && {{.KUSTOMIZE}} edit set image controller={{.IMG}})
      - '{{.KUSTOMIZE}} build config/default | kubectl apply -f -'

  undeploy:
    desc: Undeploy the operator from the current cluster
    cmds:
      - '{{.KUSTOMIZE}} build config/default | kubectl delete --ignore-not-found=true -f -'

  # --- OLM bundle + catalog ---

  bundle:
    desc: Generate OLM bundle manifests + metadata
    cmds:
      - task: manifests
      - |
        set -euo pipefail
        command -v operator-sdk >/dev/null 2>&1 || { echo "operator-sdk not found; install version from .tool-versions" >&2; exit 1; }
        operator-sdk generate kustomize manifests -q
        (cd config/manager && {{.KUSTOMIZE}} edit set image controller={{.IMG}})
        {{.KUSTOMIZE}} build config/manifests | operator-sdk generate bundle -q --overwrite --version {{.VERSION}}
        operator-sdk bundle validate ./bundle

  bundle-build:
    desc: Build the OLM bundle image
    cmds:
      - docker build -f bundle.Dockerfile -t {{.BUNDLE_IMG}} .

  bundle-push:
    desc: Push the OLM bundle image
    cmds:
      - docker push {{.BUNDLE_IMG}}

  catalog-build:
    desc: Build an OLM catalog image containing the bundle (requires opm)
    cmds:
      - |
        set -euo pipefail
        command -v opm >/dev/null 2>&1 || { echo "opm not found in PATH" >&2; exit 1; }
        opm index add --container-tool docker --mode semver --tag {{.CATALOG_IMG}} --bundles {{.BUNDLE_IMG}}

  catalog-push:
    desc: Push the OLM catalog image
    cmds:
      - docker push {{.CATALOG_IMG}}

  # --- End-to-end (local kind stack) ---

  e2e:cluster:up:
    desc: Create the e2e kind cluster from {{.E2E_KIND_CONFIG}}
    cmds:
      - |
        set -euo pipefail
        command -v kind >/dev/null 2>&1 || { echo "kind not found in PATH" >&2; exit 1; }
        if kind get clusters | grep -qx "{{.E2E_KIND_CLUSTER}}"; then
          echo "kind cluster {{.E2E_KIND_CLUSTER}} already exists; skipping create"
        else
          kind create cluster --name {{.E2E_KIND_CLUSTER}} --config {{.E2E_KIND_CONFIG}}
        fi

  e2e:cluster:addons:
    desc: Install cert-manager + external-secrets via helmfile ({{.E2E_HELMFILE}})
    cmds:
      - |
        set -euo pipefail
        command -v helmfile >/dev/null 2>&1 || { echo "helmfile not found in PATH (https://github.com/helmfile/helmfile)" >&2; exit 1; }
        command -v helm >/dev/null 2>&1 || { echo "helm not found in PATH" >&2; exit 1; }
        kubectl config use-context kind-{{.E2E_KIND_CLUSTER}}
        helmfile -f {{.E2E_HELMFILE}} sync

  e2e:cluster:fathom:
    desc: Build + load operator and probe images into kind, then deploy Fathom
    cmds:
      - task: docker-build
        vars: {IMG: '{{.E2E_IMG}}'}
      - task: probe-docker-build
        vars: {PROBE_IMG: '{{.E2E_PROBE_IMG}}'}
      - kind load docker-image {{.E2E_IMG}} --name {{.E2E_KIND_CLUSTER}}
      - kind load docker-image {{.E2E_PROBE_IMG}} --name {{.E2E_KIND_CLUSTER}}
      - task: install
      - task: deploy
        vars: {IMG: '{{.E2E_IMG}}'}

  e2e:cluster:samples:
    desc: Apply AddonCheck samples (CoreDNS, cert-manager, external-secrets)
    cmds:
      - kubectl apply -f config/samples/fathom_v1alpha1_addoncheck_coredns.yaml
      - kubectl apply -f config/samples/fathom_v1alpha1_addoncheck.yaml
      - kubectl apply -f config/samples/fathom_v1alpha1_addoncheck_external_secrets.yaml

  e2e:cluster:down:
    desc: Delete the e2e kind cluster
    cmds:
      - kind delete cluster --name {{.E2E_KIND_CLUSTER}}

  e2e:up:
    desc: Full local e2e stack — cluster + addons + Fathom + samples
    cmds:
      - task: e2e:cluster:up
      - task: e2e:cluster:addons
      - task: e2e:cluster:fathom
      - task: e2e:cluster:samples

  # --- Housekeeping ---

  clean:
    desc: Remove build outputs and test caches
    cmds:
      - go clean ./...
      - go clean -testcache
      - rm -rf bin dist coverage.out

  ci:
    desc: Run standard CI workflow locally
    cmds:
      - task: lint
      - task: test
      - task: staticcheck
      - task: vuln
      - task: build
