{{- if and .Values.rbac.create .Values.leaderElect -}}
{{/*
Leader election uses coordination.k8s.io leases (and configmaps for the
legacy lock). Namespaced Role+RoleBinding mirroring
config/rbac/leader_election_role.yaml. Gated on leaderElect.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fathom-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fathom-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fathom-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fathom-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fathom-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "fathom-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
