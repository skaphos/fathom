{{- if and .Values.metrics.service.enabled (ne .Values.metrics.bindAddress "0") -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fathom-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fathom-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  type: ClusterIP
  ports:
    - name: https
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "fathom-operator.selectorLabels" . | nindent 4 }}
    control-plane: controller-manager
{{- end }}
