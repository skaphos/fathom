---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: addonchecks.fathom.skaphos.io
spec:
  group: fathom.skaphos.io
  names:
    kind: AddonCheck
    listKind: AddonCheckList
    plural: addonchecks
    singular: addoncheck
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AddonCheck is the Schema for the addonchecks API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AddonCheckSpec defines the desired state of AddonCheck.
            properties:
              addonType:
                description: |-
                  AddonType selects the adapter responsible for this check, such as
                  cert-manager, coredns, or external-secrets.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: addonType is immutable
                  rule: self == oldSelf
              historyLimit:
                default: 10
                description: |-
                  HistoryLimit caps the number of HealthReports retained for this
                  AddonCheck. After each new HealthReport is created the controller
                  deletes the oldest reports until the total count is at or below this
                  limit. The minimum of 1 keeps Status.LastReportName referenceable.
                format: int32
                minimum: 1
                type: integer
              interval:
                description: |-
                  Interval is the cadence at which the adapter re-runs and the HealthReport
                  is refreshed. Defaults to 5m when unset. Must be at least 10s
                  (MinCheckInterval); the operator clamps stored objects that predate this
                  floor to it at runtime.
                type: string
              paused:
                description: Paused prevents the controller from starting new adapter
                  runs.
                type: boolean
              policy:
                additionalProperties:
                  description: AddonCheckFamilyPolicy configures one adapter-defined
                    family of checks.
                  properties:
                    enabled:
                      default: true
                      description: Enabled gates execution of this family.
                      type: boolean
                    labelSelector:
                      description: |-
                        LabelSelector narrows this family to resources matching the selector.
                        Selector structure and label syntax are validated at reconcile time and
                        reported through the Accepted condition (a CEL admission rule for the
                        structural checks exceeds the API server's per-CRD cost budget, because
                        the imported LabelSelector schema carries no size bounds the estimator
                        could use).
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                    namespaces:
                      description: |-
                        Namespaces narrows this family to resources in specific namespaces. Empty
                        means all namespaces the adapter can read. Each entry must be a valid
                        namespace name (DNS-1123 label); at most 64 entries.
                      items:
                        maxLength: 63
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                      maxItems: 64
                      type: array
                    thresholds:
                      additionalProperties:
                        description: |-
                          ThresholdValue is one adapter threshold knob value. It is an ordinary
                          string on the wire; the MaxLength bound exists so the API server's CEL cost
                          estimator has a real input size for the threshold shape rules below (an
                          unbounded map value string prices those rules out of the per-CRD budget).
                        maxLength: 64
                        type: string
                      description: |-
                        Thresholds carries adapter-specific string knobs, such as warnDays or
                        failDays. Adapter documentation defines the supported keys; unknown keys
                        are never rejected at admission. Keys documented as numeric are
                        shape-checked at admission: warnDays and failDays must be 1-4 digit
                        integers, warnRatio and failRatio must be percentage-shaped — at most
                        three integer digits, up to two decimals, optional trailing '%'. The
                        0-100 range and cross-key semantics stay with the adapter and surface
                        via the Accepted condition. At most 16 keys.
                      maxProperties: 16
                      type: object
                      x-kubernetes-validations:
                      - message: threshold keys must be 1-63 alphanumerics with interior
                          '-' or '_'
                        rule: self.all(k, k.matches('^[a-zA-Z0-9]([a-zA-Z0-9_-]{0,61}[a-zA-Z0-9])?$'))
                      - message: warnDays and failDays must be whole numbers of days
                          (e.g. "30")
                        rule: self.all(k, !(k in ['warnDays','failDays']) || self[k].matches('^[0-9]{1,4}$'))
                      - message: warnRatio and failRatio must be percentage values
                          with at most two decimals (e.g. "99.5" or "99.5%")
                        rule: self.all(k, !(k in ['warnRatio','failRatio']) || self[k].matches('^[0-9]{1,3}([.][0-9]{1,2})?%?$'))
                  type: object
                description: |-
                  Policy configures adapter-defined check families. A missing or empty policy
                  leaves family selection to the adapter defaults. Keys are adapter family
                  names: 1-63 lowercase alphanumerics with interior '-' or '_' (e.g.
                  system_health). Whether a well-formed key names a family the selected
                  adapter actually supports is judged at reconcile time via the Accepted
                  condition.
                maxProperties: 32
                type: object
                x-kubernetes-validations:
                - message: policy keys must be 1-63 lowercase alphanumerics with interior
                    '-' or '_'
                  rule: self.all(k, k.matches('^[a-z0-9]([a-z0-9_-]{0,61}[a-z0-9])?$'))
              timeout:
                description: |-
                  Timeout bounds a single adapter run. Must be at least 1s
                  (MinCheckTimeout); the operator clamps stored objects that predate this
                  floor to it at runtime.
                type: string
            required:
            - addonType
            type: object
            x-kubernetes-validations:
            - message: timeout must be at least 1s
              rule: '!has(self.timeout) || duration(self.timeout) >= duration(''1s'')'
            - message: interval must be at least 10s
              rule: '!has(self.interval) || duration(self.interval) >= duration(''10s'')'
            - message: timeout must not exceed interval
              rule: '!has(self.timeout) || !has(self.interval) || duration(self.timeout)
                <= duration(self.interval)'
          status:
            description: AddonCheckStatus defines the observed state of AddonCheck.
            properties:
              absent:
                description: |-
                  Absent is the number of checks in the most recent run whose target was not
                  installed — the required-absent Fails and optional-absent Skips alike. It
                  makes "not installed" queryable and distinct from "unhealthy" (a Fail whose
                  target exists) and "disabled" (a Skipped family). Zero when every checked
                  target is present (SKA-526).
                format: int32
                minimum: 0
                type: integer
              conditions:
                description: |-
                  Conditions summarize whether the controller accepted and processed this
                  check specification.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              detectedVersion:
                description: |-
                  DetectedVersion is the installed addon release version detected on the most
                  recent run (from the addon workload's app.kubernetes.io/version label, else
                  its container image tag). Empty when the adapter does not detect versions or
                  the version was undetectable — the run then proceeds best-effort (SKA-527).
                type: string
              lastReportName:
                description: LastReportName names the HealthReport created for the
                  most recent run.
                type: string
              lastResult:
                description: LastResult is the aggregate result from the most recent
                  adapter run.
                enum:
                - Pass
                - Warn
                - Fail
                - Error
                - Skipped
                - Unknown
                type: string
              lastRunTime:
                description: LastRunTime records when an adapter run last completed.
                format: date-time
                type: string
              lastRunTrigger:
                description: |-
                  LastRunTrigger records the value of the fathom.skaphos.io/run-now
                  annotation most recently consumed to force an adapter run. The controller
                  re-runs the adapter whenever the annotation value differs from this, then
                  stores it here so a given on-demand trigger fires exactly once.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent metadata.generation reconciled by
                  the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
