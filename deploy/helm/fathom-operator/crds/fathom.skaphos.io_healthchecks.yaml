---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: healthchecks.fathom.skaphos.io
spec:
  group: fathom.skaphos.io
  names:
    kind: HealthCheck
    listKind: HealthCheckList
    plural: healthchecks
    singular: healthcheck
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.result
      name: Result
      type: string
    - jsonPath: .spec.checkRef.kind
      name: Kind
      type: string
    - jsonPath: .spec.checkRef.name
      name: Target
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: HealthCheck is the Schema for the healthchecks API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              HealthCheckSpec defines the desired state of HealthCheck. A HealthCheck is
              a thin wrapper that mirrors the status of a specialized check resource into
              a uniform shape suitable for ClusterHealth aggregation. HealthCheck does not
              execute checks itself.
            properties:
              checkRef:
                description: |-
                  CheckRef identifies the specialized check resource this HealthCheck wraps.
                  It is immutable: retargeting a wrapper would silently repoint its mirrored
                  status snapshot at a different check; replace the HealthCheck instead (SKA-576).
                properties:
                  apiVersion:
                    description: |-
                      APIVersion of the target check resource. When empty, defaults to
                      fathom.skaphos.io/v1alpha1.
                    type: string
                  kind:
                    description: Kind of the target check resource (e.g., AddonCheck,
                      DNSCheck).
                    maxLength: 63
                    minLength: 1
                    type: string
                  name:
                    description: Name of the target check resource.
                    maxLength: 253
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the target check resource. When empty, the HealthCheck's
                      own namespace is used.
                    maxLength: 253
                    type: string
                required:
                - kind
                - name
                type: object
                x-kubernetes-validations:
                - message: checkRef is immutable
                  rule: self == oldSelf
              description:
                description: Description is a human-readable purpose for this HealthCheck.
                maxLength: 1024
                type: string
              paused:
                description: |-
                  Paused suspends mirroring of the referenced check's status into this
                  HealthCheck. The most recent Status snapshot is preserved while paused.
                type: boolean
            required:
            - checkRef
            type: object
          status:
            description: |-
              HealthCheckStatus defines the observed state of HealthCheck. The fields are
              derived from the referenced check's status; consumers (notably
              ClusterHealth) read this status without needing to understand any
              specialized check schema.
            properties:
              conditions:
                description: Conditions summarize the controller's view of the wrapped
                  check.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReportName:
                description: |-
                  LastReportName names the most recent HealthReport produced by the
                  referenced check, when one exists.
                maxLength: 253
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent metadata.generation
                  reconciled.
                format: int64
                type: integer
              result:
                description: Result is the outcome surfaced from the referenced check's
                  most recent run.
                enum:
                - Pass
                - Warn
                - Fail
                - Error
                - Skipped
                - Unknown
                type: string
              sourceObservedAt:
                description: SourceObservedAt is when the referenced check last completed.
                format: date-time
                type: string
              summary:
                description: Summary is a human-readable one-line outcome description.
                maxLength: 1024
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
