apiVersion: v2
name: fathom-operator
description: |
  Fathom is a Kubernetes operator (skaphos.io domain) that reconciles
  HealthCheck, ClusterHealth, and AddonCheck custom resources and persists
  HealthReport history. It launches short-lived probe pods to assess addon
  health. This chart installs the operator, its CRDs, and RBAC. The probe is
  not a long-running workload — it is launched on demand by the operator and
  configured via probeImage.
type: application
kubeVersion: ">=1.27.0-0"
# version and appVersion are bumped automatically in lockstep with the operator
# release by release-please (x-release-please-version; see
# release-please-config.json) and enforced by scripts/check-version-lockstep.sh.
# The release workflow also overrides both at package time (helm package
# --version/--app-version); keeping them correct here fixes a from-checkout
# `helm install`, which previously rendered an unpublished image tag. Do not
# hand-edit.
version: 0.4.0 # x-release-please-version
appVersion: "0.4.0" # x-release-please-version
home: https://github.com/skaphos/fathom
sources:
  - https://github.com/skaphos/fathom
keywords:
  - fathom
  - operator
  - health
  - kubernetes
  - skaphos
maintainers:
  - name: Skaphos
    url: https://github.com/skaphos
