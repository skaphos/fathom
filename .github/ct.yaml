# chart-testing configuration. https://github.com/helm/chart-testing
chart-dirs:
  - deploy/helm
target-branch: main
helm-extra-args: --timeout 3m
validate-maintainers: false
# No explicit namespace: ct creates an ephemeral namespace per release and
# deletes it afterward. The chart needs no pre-staged fixtures (ct-values
# disables secure metrics, so no serving cert/secret is required), so the
# fixed-namespace mode (which requires the namespace to pre-exist) is
# unnecessary and would fail the install.
