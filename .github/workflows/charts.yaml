name: charts

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - "config/crd/**"
      - ".github/workflows/charts.yaml"
      - ".github/ct.yaml"
  push:
    branches:
      - main
    paths:
      - "deploy/helm/**"
      - "config/crd/**"
      - ".github/workflows/charts.yaml"
      - ".github/ct.yaml"

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run ct lint
        run: ct lint --config .github/ct.yaml

  install:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Build local operator image
        run: go -C tools tool task docker-build IMG=fathom-operator:ci

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 120s

      - name: Load local image into kind
        run: |
          CLUSTER_NAME=$(kind get clusters | head -1)
          kind load docker-image fathom-operator:ci --name "$CLUSTER_NAME"

      - name: Run ct install
        run: ct install --config .github/ct.yaml
