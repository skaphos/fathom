name: Release Tag

# Pushes the actual release tag when a release-please PR is merged.
# Tag push triggers .github/workflows/release.yml.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release-tag:
    name: Push Release Tag
    permissions:
      contents: write
    # Guard against accidental tag pushes: only fire for merged PRs
    # against main that carry the release-please label.
    if: >-
      github.event.pull_request.merged &&
      github.event.pull_request.base.ref == 'main' &&
      contains(github.event.pull_request.labels.*.name, 'release-pr')
    runs-on: ubuntu-latest
    steps:
      - name: Mint release bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - uses: skaphos/actions/release-tag@a62735712beef0d48f1e975352584bbb31c53b18 # v1.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
