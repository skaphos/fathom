name: Release Please

# Stock release-please replaces the custom skaphos/actions release-pr +
# release-tag split (which closed the rolling PR on every push to main).
#
# googleapis/release-please-action maintains a single rolling release PR from
# the Conventional Commits on main. It runs with skip-github-release: true, so
# it never creates the GitHub release itself — Release Please still requires a
# tag, which the "Create release tag" step below pushes when the release PR
# merges. That v* tag triggers release.yml, which builds and publishes the
# operator/probe/OLM/chart artifacts and creates the GitHub release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint release bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Reconcile any merged release PR still labelled "autorelease: pending"
      # whose tag already exists — flips it to "autorelease: tagged" so a
      # transient failure between tag push and label update self-heals.
      - name: Reconcile tagged release PR labels
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          gh label create "autorelease: tagged" \
            --color "0e8a16" \
            --description "Release Please release PR has been tagged" \
            >/dev/null 2>&1 || true

          mapfile -t pending_prs < <(
            gh pr list \
              --state merged \
              --label "autorelease: pending" \
              --json number,title \
              --jq '.[] | @base64'
          )

          for encoded in "${pending_prs[@]}"; do
            pr="$(printf '%s' "${encoded}" | base64 -d)"
            number="$(jq -r '.number' <<<"${pr}")"
            title="$(jq -r '.title' <<<"${pr}")"

            if [[ ! "${title}" =~ ^chore\(main\):\ release\ ([^[:space:]]+) ]]; then
              echo "PR #${number} is pending but does not look like a release PR (${title}); skipping."
              continue
            fi

            tag="v${BASH_REMATCH[1]}"
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              echo "PR #${number} has existing tag ${tag}; marking autorelease: tagged."
              gh pr edit "${number}" \
                --remove-label "autorelease: pending" \
                --add-label "autorelease: tagged"
            else
              echo "PR #${number} is still pending; tag ${tag} does not exist."
            fi
          done

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # release.yml owns the GitHub release (signed images, SBOMs,
          # install.yaml); Release Please only maintains the PR and lets the
          # tag step below create the tag that triggers it.
          skip-github-release: true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # skip-github-release means Release Please never tags. When the release
      # PR merges, HEAD is the "chore(main): release X.Y.Z" commit that bumps
      # the manifest — tag it v X.Y.Z and push, which triggers release.yml.
      - name: Create release tag after release PR merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Determine the release-please subject.
          # - Squash merge: HEAD itself carries the "chore(main): release ..." subject.
          # - Regular merge commit: the second parent (the merged branch tip) carries it.
          head_subject="$(git log -1 --pretty=%s)"
          subject="${head_subject}"
          if git rev-parse -q --verify HEAD^2 >/dev/null 2>&1; then
            merged_subject="$(git log -1 --pretty=%s HEAD^2 2>/dev/null || true)"
            if [[ "${merged_subject}" == "chore(main): release "* ]]; then
              subject="${merged_subject}"
            fi
          fi

          # Recover the release PR number for the label update. A squash merge
          # carries it as the "(#NNN)" suffix on the release subject; a merge
          # commit carries it on HEAD's own "Merge pull request #NNN ..." subject
          # (which the release-subject substitution above dropped).
          pr_number=""
          if [[ "${subject}" =~ \(\#([0-9]+)\)$ ]]; then
            pr_number="${BASH_REMATCH[1]}"
          elif [[ "${head_subject}" =~ ^Merge\ pull\ request\ \#([0-9]+) ]]; then
            pr_number="${BASH_REMATCH[1]}"
          fi

          mark_release_pr_tagged() {
            if [ -z "${pr_number}" ]; then
              echo "Could not determine release PR number from ${subject}; skipping label update."
              return 0
            fi

            gh label create "autorelease: tagged" \
              --color "0e8a16" \
              --description "Release Please release PR has been tagged" \
              >/dev/null 2>&1 || true

            gh pr edit "${pr_number}" \
              --remove-label "autorelease: pending" \
              --add-label "autorelease: tagged"
          }

          case "${subject}" in
            "chore(main): release "*)
              ;;
            *)
              echo "HEAD is not a release commit (${subject}); skipping tag creation."
              exit 0
              ;;
          esac

          if ! git diff-tree --no-commit-id --name-only -r HEAD | grep -qx '.release-please-manifest.json'; then
            echo "No release manifest change in HEAD; skipping tag creation."
            exit 0
          fi

          version="$(jq -r '."."' .release-please-manifest.json)"
          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "Could not read root package version from .release-please-manifest.json" >&2
            exit 1
          fi

          tag="v${version}"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally; skipping."
            mark_release_pr_tagged
            exit 0
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on GitHub; skipping."
            mark_release_pr_tagged
            exit 0
          fi

          git config user.name "skaphos-release-bot[bot]"
          git config user.email "261675299+skaphos-release-bot[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "${tag}"
          git push origin "refs/tags/${tag}"
          mark_release_pr_tagged
