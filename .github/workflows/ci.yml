name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimum privilege for every job in this workflow. All jobs only need to
# read repository contents (checkout, upload-artifact within the same run,
# step-summary writes). No job calls APIs that need contents:write,
# pull-requests, or issues scopes. (CodeQL actions/missing-workflow-permissions.)
permissions:
  contents: read

jobs:
  dco:
    name: DCO
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on PR commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin "${BASE_REF}:${BASE_REF}"
          missing=0
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if ! git log -1 --pretty=%B "$commit" | grep -qi '^Signed-off-by: '; then
              echo "Missing Signed-off-by trailer: $commit"
              missing=1
            fi
          done < <(git rev-list --no-merges "origin/${BASE_REF}..HEAD")

          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed. Rebase/amend with: git commit --signoff"
            exit 1
          fi

  reuse:
    name: REUSE
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          # Pinned so CI doesn't pick up a new Python minor mid-stream;
          # ratchet manually when intentionally upgrading.
          python-version: '3.13'
      - name: Install REUSE tool
        # Pin to a known-good REUSE version so a new upstream release
        # cannot break CI behind our backs. Bump deliberately.
        run: python -m pip install --upgrade pip 'reuse==6.2.0'
      - name: Run REUSE lint
        run: reuse lint

  generated:
    name: Verify Generated
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Re-run generators and check for drift
        run: go -C tools tool task verify-generated

  lint:
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Run lint task
        run: go -C tools tool task lint

  test:
    name: Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Run test task
        run: go -C tools tool task test
      - name: Check coverage threshold
        run: ./scripts/check-coverage.sh coverage.out
      - name: Upload coverage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          if-no-files-found: error
          retention-days: 30

  quality:
    name: Static Analysis
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Run staticcheck task
        run: go -C tools tool task staticcheck
      - name: Run vulnerability task
        run: go -C tools tool task vuln

  build:
    name: Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [dco, reuse, generated, lint, test, quality]
    # `dco` is skipped on push events (PR-only). GitHub Actions normally
    # propagates `skipped` to dependents, so without this guard `build`
    # would be skipped on every push to main. Allow `dco == skipped`,
    # but still require every other dependency to succeed.
    if: >-
      ${{
        always() &&
        needs.reuse.result == 'success' &&
        needs.generated.result == 'success' &&
        needs.lint.result == 'success' &&
        needs.test.result == 'success' &&
        needs.quality.result == 'success' &&
        (needs.dco.result == 'success' || needs.dco.result == 'skipped')
      }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Run build task
        run: go -C tools tool task build

  summary:
    name: CI Summary
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [dco, reuse, generated, lint, test, quality, build]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Publish workflow summary
        env:
          DCO_RESULT: ${{ needs.dco.result }}
          REUSE_RESULT: ${{ needs.reuse.result }}
          GENERATED_RESULT: ${{ needs.generated.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          total=7
          success=0
          failed=0
          skipped=0
          cancelled=0

          for result in "$DCO_RESULT" "$REUSE_RESULT" "$GENERATED_RESULT" "$LINT_RESULT" "$TEST_RESULT" "$QUALITY_RESULT" "$BUILD_RESULT"; do
            case "$result" in
              success) success=$((success + 1)) ;;
              failure) failed=$((failed + 1)) ;;
              skipped) skipped=$((skipped + 1)) ;;
              cancelled) cancelled=$((cancelled + 1)) ;;
              *) failed=$((failed + 1)) ;;
            esac
          done

          {
            echo "## CI Summary"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| dco | $DCO_RESULT |"
            echo "| reuse | $REUSE_RESULT |"
            echo "| generated | $GENERATED_RESULT |"
            echo "| lint | $LINT_RESULT |"
            echo "| test | $TEST_RESULT |"
            echo "| quality | $QUALITY_RESULT |"
            echo "| build | $BUILD_RESULT |"
            echo
            echo "- Total jobs: $total"
            echo "- Success: $success"
            echo "- Failed: $failed"
            echo "- Skipped: $skipped"
            echo "- Cancelled: $cancelled"
          } >> "$GITHUB_STEP_SUMMARY"
