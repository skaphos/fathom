name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref. e2e is the most expensive workflow
# (kind clusters + image builds + the addon stack), so cancelling in-flight
# runs on a force-push or rapid PR pushes reclaims runner minutes. main is
# included; if two pushes land back-to-back only the newest is validated, which
# is acceptable for a post-merge signal.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# Minimum privilege: the jobs only read repository contents (checkout) and
# upload artifacts within the same run. No API needs write scopes.
permissions:
  contents: read

env:
  # Pinned so a new helmfile release cannot change e2e behaviour behind our
  # backs; bump deliberately. Verified against the upstream checksums file.
  HELMFILE_VERSION: "1.7.1"

# The e2e stack is tiered (skaphos/fathom#178): instead of one kind cluster
# installing every addon, the suite is sharded — an always-on `core` shard
# (Cilium CNI + cert-manager + external-secrets + CoreDNS + the
# operator-infrastructure specs) plus one shard per opt-in addon, each layering
# just its own charts on the core tier. `plan` path-filters the diff so an
# adapter-scoped PR only pays for its own shard (+ core), while shared-surface
# changes and pushes to main run the full matrix. Shards run in parallel, so
# adding an adapter adds a job instead of growing one job's wall-clock.
jobs:
  plan:
    name: plan shards
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      shards: ${{ steps.plan.outputs.shards }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so the planner can diff against the PR base branch.
          fetch-depth: 0

      - name: Plan e2e shards for this diff
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          base=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="origin/${BASE_REF}"
          fi
          shards="$(scripts/e2e-shards.sh "$base")"
          echo "planned shards: $shards"
          echo "shards=$shards" >> "$GITHUB_OUTPUT"

  shard:
    name: e2e (${{ matrix.shard }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: plan
    if: needs.plan.outputs.shards != '[]'
    strategy:
      # One flaky shard should not cancel the signal from the others.
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    env:
      # The shard name doubles as the suite's addon selection: it scopes the
      # helmfile sync (core tier + this shard's charts) and the Ginkgo label
      # filter (this shard's specs). See test/e2e/fixtures/README.md.
      E2E_ADDONS: ${{ matrix.shard }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install helmfile
        # No upstream action is SHA-pinnable for helmfile, so install the
        # release binary directly and verify it against the published
        # checksums file before putting it on PATH.
        run: |
          set -euo pipefail
          tarball="helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}"
          curl -fsSLO "${base}/${tarball}"
          curl -fsSLO "${base}/helmfile_${HELMFILE_VERSION}_checksums.txt"
          grep " ${tarball}$" "helmfile_${HELMFILE_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${tarball}" helmfile
          sudo install -m 0755 helmfile /usr/local/bin/helmfile
          rm -f "${tarball}" "helmfile_${HELMFILE_VERSION}_checksums.txt" helmfile
          helmfile --version

      - name: Create kind cluster
        # kind-action bundles a known-good kind + kubectl and tears the cluster
        # down in its post step, so no cluster leaks between re-runs. The config
        # pins the node image (kindest/node:v1.36.1, by digest) in lockstep with envtest;
        # cluster_name matches the Taskfile default E2E_KIND_CLUSTER so the
        # e2e:cluster:* sub-tasks target the same cluster/context.
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          # kind v0.32.0 is the release that ships the kindest/node:v1.36.1
          # image pinned in the config below; the action default (v0.31.0)
          # predates it and cannot provision a 1.36.1 node.
          version: v0.32.0
          config: test/e2e/fixtures/kind-cluster.yaml
          cluster_name: fathom-e2e
          # Do not wait for node Ready here: kindnet is disabled
          # (networking.disableDefaultCNI), so the node stays NotReady until the
          # next step installs Cilium as the CNI. Waiting would time out before a
          # CNI exists; helmfile's wait:true on the Cilium release gates readiness.
          wait: "0s"

      - name: Install addon stack (core tier + this shard's addon)
        run: go -C tools tool task e2e:cluster:addons

      - name: Build, load, and deploy Fathom
        # Builds the operator + probe images, loads them into kind, installs
        # CRDs, and deploys the operator into fathom-system.
        run: go -C tools tool task e2e:cluster:fathom

      - name: Run e2e suite
        # The cluster, addons, and operator are already in place, so invoke the
        # Ginkgo suite directly rather than `task test-e2e` (which would create
        # and tear down its own cluster). BeforeSuite re-syncs this shard's
        # slice of the addon stack idempotently; E2E_ADDONS also scopes the
        # specs via the Ginkgo label filter.
        run: go test ./test/e2e/ -v -ginkgo.v

      - name: Collect diagnostics
        if: failure()
        run: |
          set +e
          out=e2e-diagnostics
          mkdir -p "$out"
          kubectl get nodes -o wide                              > "$out/nodes.txt"            2>&1
          kubectl get all -A -o wide                             > "$out/all-resources.txt"    2>&1
          kubectl get events -A --sort-by=.lastTimestamp         > "$out/events.txt"           2>&1
          kubectl describe pods -A                               > "$out/describe-pods.txt"    2>&1

          crds="addonchecks.fathom.skaphos.io,healthchecks.fathom.skaphos.io,clusterhealths.fathom.skaphos.io,healthreports.fathom.skaphos.io"
          kubectl get "$crds" -A -o yaml                         > "$out/fathom-crs.yaml"      2>&1
          kubectl describe "$crds" -A                            > "$out/fathom-crs-describe.txt" 2>&1

          # Controller + addon pod logs (current and, where present, previous).
          # Opt-in addon namespaces are listed unconditionally: on shards where
          # they don't exist the pod loop simply finds nothing.
          for ns in fathom-system cert-manager external-secrets kube-system external-dns envoy-gateway-system istio-system; do
            mkdir -p "$out/logs/$ns"
            for pod in $(kubectl get pods -n "$ns" -o name 2>/dev/null); do
              name=$(basename "$pod")
              kubectl logs -n "$ns" "$pod" --all-containers --tail=5000            > "$out/logs/$ns/$name.log"          2>&1
              kubectl logs -n "$ns" "$pod" --all-containers --previous --tail=5000 > "$out/logs/$ns/$name.previous.log" 2>&1
            done
          done
          echo "diagnostics collected under $out"

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-diagnostics-${{ matrix.shard }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e-diagnostics
          if-no-files-found: warn
          retention-days: 7

  e2e:
    # Stable aggregate check. Its name intentionally matches the pre-sharding
    # job ("kind e2e") so branch-protection required checks keep working; it
    # passes when every planned shard passed, or when the planner decided the
    # diff needs no e2e at all (docs-only changes).
    name: kind e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [plan, shard]
    if: always()
    steps:
      - name: Check shard results
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          SHARD_RESULT: ${{ needs.shard.result }}
          SHARDS: ${{ needs.plan.outputs.shards }}
        run: |
          set -euo pipefail
          echo "plan: $PLAN_RESULT, shards: $SHARDS, result: $SHARD_RESULT"
          if [ "$PLAN_RESULT" != "success" ]; then
            echo "shard planning failed"
            exit 1
          fi
          if [ "$SHARD_RESULT" = "success" ]; then
            exit 0
          fi
          if [ "$SHARD_RESULT" = "skipped" ] && [ "$SHARDS" = "[]" ]; then
            echo "no e2e-relevant changes; nothing to run"
            exit 0
          fi
          exit 1
