name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: skaphos
  IMAGE_NAME: fathom-operator
  PROBE_NAME: fathom-probe
  NODE_AGENT_NAME: fathom-node-agent
  BUNDLE_NAME: fathom-operator-bundle
  CATALOG_NAME: fathom-operator-catalog

jobs:
  release:
    name: Publish operator images
    # Least-privilege scopes for a signing/attesting release job:
    #   contents:write     - create the GitHub release and upload assets (install.yaml, SBOMs)
    #   packages:write      - push operator/probe/node-agent/bundle/catalog images + Helm chart to GHCR
    #                         and the provenance attestation manifests alongside them
    #   id-token:write      - mint the OIDC token for keyless cosign signing + provenance
    #   attestations:write  - record build provenance via actions/attest-build-provenance
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install operator-sdk
        # Pin comes from .tool-versions. Verify the binary against the
        # upstream checksums.txt (same pattern as helmfile in e2e.yml) so a
        # compromised or swapped asset cannot land on PATH unsigned.
        run: |
          set -euo pipefail
          VERSION=$(awk '/^operator-sdk /{print $2}' .tool-versions)
          binary="operator-sdk_linux_amd64"
          base="https://github.com/operator-framework/operator-sdk/releases/download/v${VERSION}"
          curl -fsSLO "${base}/${binary}"
          curl -fsSLO "${base}/checksums.txt"
          grep " ${binary}$" checksums.txt | sha256sum -c -
          sudo install -m 0755 "${binary}" /usr/local/bin/operator-sdk
          rm -f "${binary}" checksums.txt
          operator-sdk version

      - name: Install opm
        # Pinned opm release (v1.72.0). Verify against the published
        # checksums.txt before install — operator-registry ships a multi-arch
        # checksums file next to each release asset.
        run: |
          set -euo pipefail
          OPM_VERSION="1.72.0"
          binary="linux-amd64-opm"
          base="https://github.com/operator-framework/operator-registry/releases/download/v${OPM_VERSION}"
          curl -fsSLO "${base}/${binary}"
          curl -fsSLO "${base}/checksums.txt"
          grep " ${binary}$" checksums.txt | sha256sum -c -
          sudo install -m 0755 "${binary}" /usr/local/bin/opm
          rm -f "${binary}" checksums.txt
          opm version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compute tag vars
        id: vars
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          IMG="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:v${VERSION}"
          PROBE_IMG="${REGISTRY}/${IMAGE_NAMESPACE}/${PROBE_NAME}:v${VERSION}"
          NODE_AGENT_IMG="${REGISTRY}/${IMAGE_NAMESPACE}/${NODE_AGENT_NAME}:v${VERSION}"
          BUNDLE_IMG="${REGISTRY}/${IMAGE_NAMESPACE}/${BUNDLE_NAME}:v${VERSION}"
          CATALOG_IMG="${REGISTRY}/${IMAGE_NAMESPACE}/${CATALOG_NAME}:v${VERSION}"
          # Bare (untagged) repository names. cosign signs and
          # actions/attest-build-provenance attests by immutable digest
          # (name@sha256:...), so we publish the names alongside the tags.
          {
            echo "version=${VERSION}"
            echo "img=${IMG}"
            echo "probe_img=${PROBE_IMG}"
            echo "node_agent_img=${NODE_AGENT_IMG}"
            echo "bundle_img=${BUNDLE_IMG}"
            echo "catalog_img=${CATALOG_IMG}"
            echo "img_name=${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
            echo "probe_name=${REGISTRY}/${IMAGE_NAMESPACE}/${PROBE_NAME}"
            echo "node_agent_name=${REGISTRY}/${IMAGE_NAMESPACE}/${NODE_AGENT_NAME}"
            echo "bundle_name=${REGISTRY}/${IMAGE_NAMESPACE}/${BUNDLE_NAME}"
            echo "catalog_name=${REGISTRY}/${IMAGE_NAMESPACE}/${CATALOG_NAME}"
            echo "chart_name=${REGISTRY}/${IMAGE_NAMESPACE}/charts/${IMAGE_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push operator image (multi-arch)
        id: operator
        env:
          IMG: ${{ steps.vars.outputs.img }}
        run: |
          set -euo pipefail
          go -C tools tool task docker-buildx-push IMG="${IMG}"
          # Resolve the immutable digest the registry assigned so downstream
          # signing/attestation pin name@sha256:... rather than a mutable tag.
          # For a multi-arch build this is the manifest-list (index) digest.
          DIGEST=$(docker buildx imagetools inspect "${IMG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Build and push probe image (multi-arch)
        id: probe
        env:
          PROBE_IMG: ${{ steps.vars.outputs.probe_img }}
        run: |
          set -euo pipefail
          go -C tools tool task probe-docker-buildx-push PROBE_IMG="${PROBE_IMG}"
          DIGEST=$(docker buildx imagetools inspect "${PROBE_IMG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Build and push node-agent image (multi-arch)
        id: node_agent
        env:
          NODE_AGENT_IMG: ${{ steps.vars.outputs.node_agent_img }}
        run: |
          set -euo pipefail
          go -C tools tool task node-agent-docker-buildx-push NODE_AGENT_IMG="${NODE_AGENT_IMG}"
          DIGEST=$(docker buildx imagetools inspect "${NODE_AGENT_IMG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate install.yaml
        run: |
          go -C tools tool task build-installer IMG=${{ steps.vars.outputs.img }}

      - name: Build and push OLM bundle
        id: bundle
        env:
          IMG: ${{ steps.vars.outputs.img }}
          VERSION: ${{ steps.vars.outputs.version }}
          BUNDLE_IMG: ${{ steps.vars.outputs.bundle_img }}
        run: |
          set -euo pipefail
          go -C tools tool task bundle IMG="${IMG}" VERSION="${VERSION}"
          go -C tools tool task bundle-build BUNDLE_IMG="${BUNDLE_IMG}"
          go -C tools tool task bundle-push BUNDLE_IMG="${BUNDLE_IMG}"
          DIGEST=$(docker buildx imagetools inspect "${BUNDLE_IMG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Build and push OLM catalog
        id: catalog
        env:
          BUNDLE_IMG: ${{ steps.vars.outputs.bundle_img }}
          CATALOG_IMG: ${{ steps.vars.outputs.catalog_img }}
        run: |
          set -euo pipefail
          go -C tools tool task catalog-build BUNDLE_IMG="${BUNDLE_IMG}" CATALOG_IMG="${CATALOG_IMG}"
          go -C tools tool task catalog-push CATALOG_IMG="${CATALOG_IMG}"
          DIGEST=$(docker buildx imagetools inspect "${CATALOG_IMG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Package and push Helm chart (OCI)
        id: chart
        # Helm reuses the GHCR credentials stored by docker/login-action above,
        # so no separate `helm registry login` is needed. Chart version and
        # appVersion are the plain semver tag (no leading v) — Helm requires it.
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/charts
          helm package deploy/helm/fathom-operator \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist/charts
          # `helm push` prints "Digest: sha256:..." on success; capture it so
          # the chart artifact can be signed and attested by digest too.
          helm push "dist/charts/fathom-operator-${VERSION}.tgz" \
            "oci://${REGISTRY}/${IMAGE_NAMESPACE}/charts" 2>&1 | tee dist/charts/helm-push.log
          DIGEST=$(awk '/[Dd]igest:/ {print $2}' dist/charts/helm-push.log)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # --- Supply-chain hardening (SKA-296) -------------------------------
      # Keyless signing + build provenance + SBOMs for every published
      # artifact. All identity comes from the job's OIDC token (id-token:
      # write); there are no long-lived signing keys.

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign images and chart (keyless)
        env:
          COSIGN_YES: "true"
          OPERATOR_REF: ${{ steps.vars.outputs.img_name }}@${{ steps.operator.outputs.digest }}
          PROBE_REF: ${{ steps.vars.outputs.probe_name }}@${{ steps.probe.outputs.digest }}
          NODE_AGENT_REF: ${{ steps.vars.outputs.node_agent_name }}@${{ steps.node_agent.outputs.digest }}
          BUNDLE_REF: ${{ steps.vars.outputs.bundle_name }}@${{ steps.bundle.outputs.digest }}
          CATALOG_REF: ${{ steps.vars.outputs.catalog_name }}@${{ steps.catalog.outputs.digest }}
          CHART_REF: ${{ steps.vars.outputs.chart_name }}@${{ steps.chart.outputs.digest }}
        run: |
          set -euo pipefail
          for ref in "$OPERATOR_REF" "$PROBE_REF" "$NODE_AGENT_REF" "$BUNDLE_REF" "$CATALOG_REF" "$CHART_REF"; do
            echo "Signing ${ref}"
            cosign sign --yes "${ref}"
          done

      - name: Attest operator image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.img_name }}
          subject-digest: ${{ steps.operator.outputs.digest }}
          push-to-registry: true

      - name: Attest probe image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.probe_name }}
          subject-digest: ${{ steps.probe.outputs.digest }}
          push-to-registry: true

      - name: Attest node-agent image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.node_agent_name }}
          subject-digest: ${{ steps.node_agent.outputs.digest }}
          push-to-registry: true

      - name: Attest OLM bundle provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.bundle_name }}
          subject-digest: ${{ steps.bundle.outputs.digest }}
          push-to-registry: true

      - name: Attest OLM catalog provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.catalog_name }}
          subject-digest: ${{ steps.catalog.outputs.digest }}
          push-to-registry: true

      - name: Attest Helm chart provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.chart_name }}
          subject-digest: ${{ steps.chart.outputs.digest }}
          push-to-registry: true

      - name: Prepare SBOM output directory
        run: mkdir -p dist/sbom

      - name: Generate SBOM for operator image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.vars.outputs.img }}
          format: spdx-json
          output-file: dist/sbom/fathom-operator-${{ steps.vars.outputs.version }}.spdx.json
          upload-artifact: false

      - name: Generate SBOM for probe image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.vars.outputs.probe_img }}
          format: spdx-json
          output-file: dist/sbom/fathom-probe-${{ steps.vars.outputs.version }}.spdx.json
          upload-artifact: false

      - name: Generate SBOM for node-agent image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.vars.outputs.node_agent_img }}
          format: spdx-json
          output-file: dist/sbom/fathom-node-agent-${{ steps.vars.outputs.version }}.spdx.json
          upload-artifact: false

      - name: Create GitHub release with install.yaml and SBOMs
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/install.yaml
            dist/sbom/*.spdx.json
          generate_release_notes: true
