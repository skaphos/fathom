name: Release PR

# Maintains the rolling release-please PR on main. Every push to main
# either creates the PR (if one doesn't exist) or updates it with the
# new commits, version bump, and changelog. The PR is merged manually
# to publish the release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Maintain Release PR
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Mint release bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - uses: skaphos/actions/release-pr@a62735712beef0d48f1e975352584bbb31c53b18 # v1.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
