#
# Replace the ServiceMonitor TLS config with a cert-manager-backed
# configuration. Requires the metrics-server-cert Secret (managed by
# cert-manager) to be present in the same namespace as the ServiceMonitor.
- op: replace
  path: /spec/endpoints/0/tlsConfig
  value:
    serverName: SERVICE_NAME.SERVICE_NAMESPACE.svc
    insecureSkipVerify: false
    ca:
      secret:
        name: metrics-server-cert
        key: ca.crt
    cert:
      secret:
        name: metrics-server-cert
        key: tls.crt
    keySecret:
      name: metrics-server-cert
      key: tls.key
