apiVersion: fathom.skaphos.io/v1alpha1
kind: ClusterHealth
metadata:
  labels:
    app.kubernetes.io/name: fathom
    app.kubernetes.io/managed-by: kustomize
  name: platform
spec:
  description: "Aggregate the worst-case Result across every HealthCheck in the cluster."
  # ClusterHealth is cluster-scoped. An empty/omitted selector matches all
  # HealthChecks. Namespace scope precedence:
  #   1. namespaces (allowlist) — definitive when set
  #   2. else excludedNamespaces (denylist)
  #   3. else open (all namespaces)
  #
  #   namespaces:
  #     - fathom-system
  #   # excludedNamespaces:
  #   #   - scratch
  #   selector:
  #     matchLabels:
  #       team: platform
