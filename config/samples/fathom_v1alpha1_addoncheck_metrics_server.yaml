apiVersion: fathom.skaphos.io/v1alpha1
kind: AddonCheck
metadata:
  labels:
    app.kubernetes.io/name: fathom
    app.kubernetes.io/managed-by: kustomize
  name: metrics-server-sample
spec:
  addonType: metrics-server
  interval: 5m
  timeout: 30s
  policy:
    system_health:
      enabled: true
      namespaces:
        - kube-system
      thresholds:
        restartWarnCount: "3"
        # The Deployment follows the Helm release fullname; point the check at
        # a renamed install:
        # deploymentName: "metrics-server"
    api_availability:
      enabled: true
